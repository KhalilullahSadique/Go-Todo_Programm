name: Daily Contributions

on:
  schedule:
    # GitHub cron is always UTC. PKT = UTC+5.
    # Minutes are deliberately OFF the top of the hour: GitHub delays/drops
    # scheduled runs most at :00, so :17 / :23 are more reliable.
    - cron: "17 5 * * *"    # ~10:17 AM PKT (morning session)
    - cron: "23 14 * * *"   # ~07:23 PM PKT (evening session)
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make daily commits
        run: |
          git config user.name  "khalilSediq"
          git config user.email "khalilullahsadique1334@gmail.com"

          # --- Human-like commit count -------------------------------------
          # Goal: some weeks are "heavy" (~50/day), some are "light" (~30/day),
          # with small day-to-day jitter, occasional quiet days, and rare
          # rest days. Streaks come from seeding the week's "mood" by week no.
          WEEK=$(date +%V)      # ISO week number (01-53) -> stable for 7 days
          DOW=$(date +%u)       # day of week 1..7 (Mon..Sun)

          # Pick this week's baseline from the week number (deterministic per
          # week, so Mon-Sun share a similar level = a natural streak).
          case $(( WEEK % 5 )) in
            0) BASE=50 ;;   # heavy week
            1) BASE=45 ;;
            2) BASE=30 ;;   # lighter week
            3) BASE=38 ;;
            4) BASE=50 ;;   # heavy week
          esac

          # Day-to-day jitter: +/- up to 8 commits.
          JITTER=$(( (RANDOM % 17) - 8 ))
          COUNT=$(( BASE + JITTER ))

          # This workflow runs twice a day (morning + evening), so each run
          # makes about half the day's commits. Split is uneven on purpose.
          HALF=$(( (RANDOM % 3) + 4 ))          # 4,5,6 -> 40%-60%
          COUNT=$(( COUNT * HALF / 10 ))

          # Weekends: people commit less. ~40% chance a weekend day is quiet.
          if [ "$DOW" -ge 6 ] && [ $(( RANDOM % 5 )) -lt 2 ]; then
            COUNT=$(( (RANDOM % 8) + 3 ))   # quiet weekend day: 3-10
          fi

          # Rare full rest day (~1 in 12 runs) so it isn't a perfect streak.
          if [ $(( RANDOM % 12 )) -eq 0 ]; then
            echo "Rest day - no commits today."
            exit 0
          fi

          # Clamp to sane bounds.
          [ "$COUNT" -lt 1 ]  && COUNT=1
          [ "$COUNT" -gt 60 ] && COUNT=60
          echo "Week $WEEK (base $BASE), DOW $DOW -> making $COUNT commits"

          mkdir -p .contrib
          for i in $(seq 1 "$COUNT"); do
            echo "activity $(date --iso-8601=seconds) #$i" >> .contrib/log.txt
            git add .contrib/log.txt
            git commit -q -m "chore: daily activity $(date +%F) #$i"
          done

          git push origin HEAD:main
